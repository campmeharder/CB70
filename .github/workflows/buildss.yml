name: Build ZMK firmware
on:
  workflow_dispatch:
  push:
    paths-ignore:
      - "keymap-drawer/**"

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@v0.3.0

include:
  - board: nice_nano_v2
    shield: cb70s_left
  - board: nice_nano_v2
    shield: cb70s_right
  - board: nice_nano_v2
    shield: settings_reset
